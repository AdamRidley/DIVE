<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIVE Example: The Wealth and Health of Nations</title>
    <style>
      :root {
        --bg: #0d0f18;
        --bg-2: #1a2136;
        --ink: #f7f9ff;
        --muted: #c5cbe3;
        --accent: #ffba6a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Sora", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 82% 18%, rgba(255, 186, 106, 0.22), transparent 32%),
          radial-gradient(circle at 14% 70%, rgba(124, 170, 255, 0.18), transparent 30%),
          linear-gradient(145deg, var(--bg), var(--bg-2));
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 16px 20px 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 3vw, 1.7rem);
        letter-spacing: 0.01em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        max-width: 70ch;
        font-size: 0.95rem;
      }

      main {
        padding: 10px 20px 20px;
      }

      dive-video {
        display: block;
        width: min(1200px, 100%);
        height: min(74vh, 760px);
        min-height: 420px;
        margin: 0 auto;
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      }

      .hint {
        text-align: center;
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      @media (max-width: 900px) {
        main {
          padding: 10px 10px 16px;
        }

        dive-video {
          height: min(72vh, 600px);
          min-height: 380px;
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>The Wealth and Health of Nations</h1>
      <p>
        A D3-first DIVE narrative using Gapminder data: continent lifespan lines, Rosling bubbles,
        and a zoomable global population treemap.
      </p>
    </header>

    <main>
      <dive-video src="/examples/the_wealth_and_health_of_nations/story.json"></dive-video>
      <div class="hint">Play to watch the scripted narrative. Pause anytime to explore.</div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
