name: Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_REPO: ${{ vars.DOCKER_IMAGE_REPO || format('{0}/dive-example', github.repository_owner) }}

jobs:
  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build framework bundle
        run: npm run build

      - name: Build example bundle
        run: npx vite build -c examples/the_wealth_and_health_of_nations/vite.config.example.mjs

      - name: Package release artifacts
        run: |
          tar -czf dist.tar.gz dist
          tar -czf dist-example.tar.gz dist-example

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.tar.gz
            dist-example.tar.gz

  publish-image:
    runs-on: ubuntu-latest
    needs: release-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image repository name
        id: image_meta
        shell: bash
        run: |
          image_repo="${IMAGE_REPO,,}"
          echo "image=${REGISTRY}/${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/the_wealth_and_health_of_nations/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.image_meta.outputs.image }}:${{ github.ref_name }}
            ${{ steps.image_meta.outputs.image }}:latest
